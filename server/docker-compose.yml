# Local development: spin up the same container we deploy to Cloud Run.
#
#   docker compose -f server/docker-compose.yml up --build
#
# Then point the frontend at it:
#   VITE_PDF_API_URL=http://localhost:8080 npm run dev

services:
  pdf:
    build: .
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
